# Base configuration file for the federated learning experiment on traffic classification using Flower framework

num_clients: 2 # Total number of clients in the federated learning simulation

config: # Configuration for the training process, including hyperparameters and settings
  lr: 0.001
  seed: 0 ## Random seed for reproducibility, change it for different runs
  federated_rounds: 20
  num_epochs: 2         
  batch_size: 256
  max_grad_norm: 1.0     
  noise_levels: [null, 1.0] #[null, 0.33, 0.67, 1.0, 1.33, 1.67, 2.0]
  sup_levels: [14, 12, 10, 8, 6, 4, 2, 0]

dataset: # Configuration related to the dataset, including paths and feature/target columns
  input_path: "dataset/dataset.parquet"
  paths:
    p1: "dataset/p1.parquet"
    p2: "dataset/p2.parquet"
    p11: "dataset/p11.parquet"
    p12: "dataset/p12.parquet"
    p21: "dataset/p21.parquet"
    p22: "dataset/p22.parquet"
  feature_columns: 
    - protocol
    - bidirectional_min_ps
    - bidirectional_mean_ps
    - bidirectional_stddev_ps
    - bidirectional_max_ps
    - src2dst_stddev_ps
    - src2dst_max_ps
    - dst2src_min_ps
    - dst2src_mean_ps
    - dst2src_stddev_ps
    - dst2src_max_ps
    - bidirectional_stddev_piat_ms
    - bidirectional_max_piat_ms
    - bidirectional_rst_packets
  target_column: 'application_name'
  initial_split_ratio: 0.5
  test_split_ratio: 0.2

hydra: # Configuration for Hydra, which manages the experiment's configuration and execution
  job:
    chdir: True
  run:
    dir: .          
  output_subdir: null 