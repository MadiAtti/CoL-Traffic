num_rounds: 2 #20           
num_clients: 2

config:
  lr: 0.001
  seed: 42
  num_epochs: 2         
  batch_size: 256
  max_grad_norm: 1.0     
  noise_levels: [null, 0.33] #, 0.67, 1.0, 1.33, 1.67, 2.0]

dataset:
  input_path: "dataset/dataset.parquet"
  paths:
    p1: "dataset/p1.parquet"
    p2: "dataset/p2.parquet"
    p11: "dataset/p11.parquet"
    p12: "dataset/p12.parquet"
    p21: "dataset/p21.parquet"
    p22: "dataset/p22.parquet"
  feature_columns: 
    - protocol
    - bidirectional_min_ps
    - bidirectional_mean_ps
    - bidirectional_stddev_ps
    - bidirectional_max_ps
    - src2dst_stddev_ps
    - src2dst_max_ps
    - dst2src_min_ps
    - dst2src_mean_ps
    - dst2src_stddev_ps
    - dst2src_max_ps
    - bidirectional_stddev_piat_ms
    - bidirectional_max_piat_ms
    - bidirectional_rst_packets
  target_column: 'application_name'
  initial_split_ratio: 0.5
  test_split_ratio: 0.2

hydra:
  job:
    chdir: True
  run:
    dir: .          
  output_subdir: null 