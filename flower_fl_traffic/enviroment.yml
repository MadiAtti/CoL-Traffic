name: flower-fl-traffic
channels:
  - pytorch
  - apple
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy=1.24.3
  - pytorch>=2.1.0
  - torchvision
  - torchaudio
  - pandas
  - scikit-learn
  - pyarrow
  - pip
  - pip:
    - "setuptools<70.0.0"
    - hydra-core==1.3.2
    - "flwr[simulation]==1.7.0"
    - opacus==1.4.0
    - ray[default]==2.6.3
    - setuptools